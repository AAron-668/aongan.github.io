<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | AONGAN</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
        body{background:#f8f5f0;color:#4a3f35;}
        header{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
        .nav{max-width:1200px;margin:0 auto;display:flex;justify-content:center;gap:2rem;padding:1.5rem;flex-wrap:wrap;}
        .nav a{text-decoration:none;color:#4a3f35;font-weight:600;transition:0.3s;}
        .nav a:hover{color:#b89678;}
        .banner{width:100%;height:400px;background:url("images/contact_banner.jpg") center/cover no-repeat;display:flex;align-items:center;justify-content:center;color:#fff;}
        .banner h1{font-size:2.5rem;}
        .container{max-width:600px;margin:4rem auto;padding:0 1rem;}
        .contact-box{background:#fff;padding:3rem;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.08);}
        .contact-box h2{margin-bottom:2rem;text-align:center;}
        .info-text{text-align:center;margin-bottom:2rem;line-height:1.8;}
        input,textarea{width:100%;padding:1rem;margin-bottom:1rem;border:1px solid #ddd;border-radius:6px;font-size:1rem;}
        button{width:100%;padding:1rem;background:#4a3f35;color:#fff;border:none;border-radius:6px;font-size:1.1rem;cursor:pointer;transition:0.3s;}
        button:hover{background:#b89678;}
        footer{background:#4a3f35;color:#fff;text-align:center;padding:2rem;margin-top:4rem;}
    </style>
</head>
<body>
    <header>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="products.html">Products</a>
            <a href="blog.html">Blog</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="banner">
        <h1>Contact Us</h1>
    </section>

    <div class="container">
        <div class="contact-box">
            <h2>Get In Touch</h2>
            <div class="info-text">
                <p>Email: aongan.beeswax@gmail.com</p>
                <p>Business Cooperation & Wholesale Inquiry Welcome</p>
            </div>

            <input type="email" id="customerMail" placeholder="Your Email Address">
            <textarea id="customerMsg" rows="5" placeholder="Write your message here..."></textarea>
            <button onclick="sendMail()">Send Message</button>
        </div>
    </div>

    <footer>
        <p>Email: aongan.beeswax@gmail.com | © 2025 AONGAN All Rights Reserved</p>
    </footer>

    <script>
        function sendMail(){
            let cusMail = document.getElementById("customerMail").value;
            let cusMsg = document.getElementById("customerMsg").value;
            let toMail = "aongan.beeswax@gmail.com";
            let subject = "New Inquiry from AONGAN Website";
            let body = "Customer Email: " + cusMail + "\n\nMessage:\n" + cusMsg;

            // 直接跳转 Gmail 网页版，100% 不会拦截
            let link = "https://mail.google.com/mail/?view=cm&fs=1&to=" + toMail
            + "&su=" + encodeURIComponent(subject)
            + "&body=" + encodeURIComponent(body);

            // 新标签页打开
            window.open(link, "_blank");
        }
    </script>
</body>
</html>
