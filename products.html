<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | AONGAN</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
        body{background:#f8f5f0;color:#4a3f35;}
        header{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
        .nav{max-width:1200px;margin:0 auto;display:flex;justify-content:center;gap:2rem;padding:1.5rem;flex-wrap:wrap;}
        .nav a{text-decoration:none;color:#4a3f35;font-weight:600;transition:0.3s;}
        .nav a:hover{color:#b89678;}
        .banner{width:100%;height:400px;background:url(images/products_banner.png) center/cover no-repeat;display:flex;align-items:center;justify-content:center;color:#fff;}
        .banner h1{font-size:2.5rem;}
        .container{max-width:1200px;margin:4rem auto;padding:0 1rem;}
        .section-title{text-align:center;font-size:2rem;margin-bottom:3rem;}
        .product-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(280px,1fr));gap:2.5rem;}
        .product-card{background:#fff;padding:2rem;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.08);text-align:center;}
        .product-card img{width:100%;height:260px;object-fit:cover;border-radius:6px;margin-bottom:1.5rem;}
        .product-card h3{margin-bottom:0.8rem;}
        .product-card p{color:#777;}
        .detail-row{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-top:5rem;}
        .detail-row img{width:100%;border-radius:8px;}
        footer{background:#4a3f35;color:#fff;text-align:center;padding:2rem;margin-top:4rem;}
    </style>
</head>
<body>
    <header>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="products.html">Products</a>
            <a href="blog.html">Blog</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="banner">
        <h1>Our Products</h1>
    </section>

    <div class="container">
        <h2 class="section-title">Size Series</h2>
        <div class="product-grid">
            <div class="product-card">
                <img src="images/bag_size_s.png" alt="Small Size">
                <h3>Small Size</h3>
                <p>11.5 × 9 in</p>
            </div>
            <div class="product-card">
                <img src="images/bag_size_m.png" alt="Medium Size">
                <h3>Medium Size</h3>
                <p>13 × 13 in</p>
            </div>
            <div class="product-card">
                <img src="images/bag_size_l.png" alt="Large Size">
                <h3>Large Size</h3>
                <p>17 × 13 in</p>
            </div>
            <div class="product-card">
                <img src="images/bag_set.png" alt="Bag Set">
                <h3>Bag Set</h3>
                <p>Multiple Combination</p>
            </div>
        </div>

        <h2 class="section-title" style="margin-top:5rem;">Product Details</h2>
        <div class="detail-row">
            <img src="images/bag_detail1.png" alt="Detail">
            <img src="images/bag_detail2.png" alt="Detail">
        </div>
    </div>

    <footer>
        <p>Email: aongan.beeswax@gmail.com | © 2025 AONGAN All Rights Reserved</p>
    </footer>
</body>
</html>
